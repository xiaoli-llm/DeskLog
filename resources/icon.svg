<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Claude 风格渐变 -->
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="50%" style="stop-color:#D97706"/>
      <stop offset="100%" style="stop-color:#B45309"/>
    </linearGradient>
    <!-- 内部光晕 -->
    <radialGradient id="innerGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#FDE68A;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:0"/>
    </radialGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#92400E" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景圆角方形 -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#claudeGrad)" filter="url(#shadow)"/>

  <!-- 内部装饰圆 -->
  <circle cx="256" cy="220" r="140" fill="url(#innerGlow)"/>

  <!-- 书页/日志本主体 -->
  <g transform="translate(256, 240)">
    <!-- 左页 -->
    <path d="M-80,-80 C-80,-90 -70,-100 -60,-100 L60,-100 C70,-100 80,-90 80,-80 L80,70 C80,80 70,90 60,90 L-60,90 C-70,90 -80,80 -80,70 Z"
          fill="#FFFFFF" fill-opacity="0.95"/>

    <!-- 书脊装饰线 -->
    <line x1="-50" y1="-100" x2="-50" y2="90" stroke="#D97706" stroke-width="3" stroke-opacity="0.4"/>

    <!-- 文字行 - 模拟日志内容 -->
    <rect x="-30" y="-70" width="80" height="8" rx="4" fill="#D97706" fill-opacity="0.6"/>
    <rect x="-30" y="-50" width="60" height="6" rx="3" fill="#92400E" fill-opacity="0.3"/>
    <rect x="-30" y="-34" width="70" height="6" rx="3" fill="#92400E" fill-opacity="0.3"/>
    <rect x="-30" y="-18" width="50" height="6" rx="3" fill="#92400E" fill-opacity="0.3"/>

    <!-- 复选框任务列表 -->
    <rect x="-30" y="10" width="12" height="12" rx="3" stroke="#D97706" stroke-width="2" fill="none"/>
    <rect x="-12" y="14" width="50" height="6" rx="3" fill="#16A34A" fill-opacity="0.5"/>

    <rect x="-30" y="32" width="12" height="12" rx="3" stroke="#D97706" stroke-width="2" fill="none"/>
    <rect x="-12" y="36" width="40" height="6" rx="3" fill="#D97706" fill-opacity="0.5"/>

    <rect x="-30" y="54" width="12" height="12" rx="3" stroke="#A8A29E" stroke-width="2" fill="none"/>
    <rect x="-12" y="58" width="55" height="6" rx="3" fill="#A8A29E" fill-opacity="0.4"/>
  </g>

  <!-- 装饰性对勾 -->
  <circle cx="380" cy="160" r="28" fill="#16A34A" fill-opacity="0.9"/>
  <path d="M366,160 L376,170 L394,150" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 底部装饰点 -->
  <circle cx="180" cy="400" r="6" fill="#FFFFFF" fill-opacity="0.4"/>
  <circle cx="200" cy="400" r="6" fill="#FFFFFF" fill-opacity="0.4"/>
  <circle cx="220" cy="400" r="6" fill="#FFFFFF" fill-opacity="0.4"/>
</svg>
